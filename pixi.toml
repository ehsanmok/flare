[workspace]
authors = ["ehsanmok <ehsanmok@users.noreply.github.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "flare"
platforms = ["osx-arm64", "linux-aarch64", "linux-64"]
version = "0.4.1"
preview = ["pixi-build"]

[package]
name = "flare"
version = "0.4.1"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "*" }

# Binary dependencies are specified in recipe.yaml for rattler-build backend

[activation]
# Auto-build FFI wrapper libraries on environment activation (idempotent).
# Requires OpenSSL and zlib from conda-forge (declared in [dependencies])
# and, on Linux, a g++ toolchain (declared in the per-platform
# [target.*.dependencies] blocks below — macOS uses system clang++ from
# the Xcode Command Line Tools, so no conda compiler is required there).
scripts = ["flare/tls/ffi/build.sh", "flare/http/ffi/build.sh"]

# ── Base runtime dependencies (lean) ──────────────────────────────────────────
# These are everything flare itself needs at runtime — what a *user* of flare
# as a library picks up. Contributor-only tooling (docs generator, pre-commit
# hooks) lives under [feature.dev] and is opted into via `pixi install -e dev`.
[dependencies]
mojo             = "<1.0"
openssl          = ">=3.6.1,<4"    # TLS: libssl + libcrypto (SHA-1 for WS handshake)
ca-certificates  = ">=2025.1.31"   # TLS default CA bundle → $CONDA_PREFIX/ssl/cacert.pem
zlib             = ">=1.3.1,<2"    # HTTP: Content-Encoding gzip/deflate decompression
json             = { git = "https://github.com/ehsanmok/json.git", branch = "main" }

# g++ is a BUILD-time dep on Linux: the activation scripts
# (flare/tls/ffi/build.sh, flare/http/ffi/build.sh) invoke g++ to compile
# libflare_tls.so + libflare_zlib.so. Without it the default env cannot
# even activate on Linux. macOS intentionally uses system clang++ (no
# conda compiler) so this block is Linux-only.
[target.linux-64.dependencies]
gxx = ">=13"

[target.linux-aarch64.dependencies]
gxx = ">=13"

# ── Contributor tooling (docs, formatter hook) ───────────────────────────────
# Opt in with: pixi install -e dev     (or -e fuzz / -e bench, which include
# feature.dev automatically).
[feature.dev.dependencies]
pre-commit = ">=4.2.0,<5"
mojodoc    = { git = "https://github.com/ehsanmok/mojodoc.git", branch = "main" }

[feature.fuzz.dependencies]
mozz = { git = "https://github.com/ehsanmok/mozz.git", branch = "main" }

[feature.bench.dependencies]
# Stage 1 / Phase 1.6 — bench harness baselines.
# Pinned exact so nobody ever benchmarks against a drifting toolchain.
go    = ">=1.22,<1.25"  # Go stdlib net/http baseline
nginx = ">=1.25,<1.29"  # 1-worker plaintext baseline

[feature.bench.target.linux-64.dependencies]
wrk = ">=4.2.0"     # conda-forge has wrk on linux-64; macOS uses system wrk

[feature.bench.tasks]
# ── Benchmark harness (Stage 1 / Phase 1.6) ──────────────────────────────────
# All baselines are pinned per [feature.bench.dependencies].
# Run with: pixi run --environment bench <task>
bench-vs-baseline         = "bash benchmark/scripts/bench_vs_baseline.sh"
bench-vs-baseline-quick   = "bash benchmark/scripts/bench_vs_baseline.sh --only=flare,go_nethttp --configs=throughput"
bench-integrity-only      = "bash benchmark/scripts/_integrity_check.sh"
bench-collect-env         = "bash benchmark/scripts/_collect_env.sh"

[feature.fuzz.tasks]
# ── Fuzzing (mozz) ────────────────────────────────────────────────────────────
# mozz is installed as a pixi dependency (feature.fuzz) and packaged as
# mozz.mojopkg into $PREFIX/lib/mojo/ — no -I flag needed.
# Run with: pixi run --environment fuzz <task>
fuzz-ws            = "mojo -I . fuzz/fuzz_ws_frame.mojo"
fuzz-url           = "mojo -I . fuzz/fuzz_url.mojo"
fuzz-headers       = "mojo -I . fuzz/fuzz_http_headers.mojo"
fuzz-http-response = "mojo -I . fuzz/fuzz_http_response.mojo"
fuzz-http-server   = "mojo -I . fuzz/fuzz_http_server.mojo"
fuzz-ws-server     = "mojo -I . fuzz/fuzz_ws_server.mojo"
prop-ws            = "mojo -I . fuzz/prop_ws_roundtrip.mojo"
prop-headers       = "mojo -I . fuzz/prop_headers.mojo"
prop-auth          = "mojo -I . fuzz/prop_auth.mojo"
fuzz-encoding      = "mojo -I . fuzz/fuzz_encoding.mojo"
fuzz-cookie        = "mojo -I . fuzz/fuzz_cookie.mojo"
fuzz-reactor-churn = "mojo -I . fuzz/fuzz_reactor_churn.mojo"
prop-timer-wheel   = "mojo -I . fuzz/prop_timer_wheel.mojo"
fuzz-server-reactor-chunks = "mojo -I . fuzz/fuzz_server_reactor_chunks.mojo"
fuzz-router-paths  = "mojo -I . fuzz/fuzz_router_paths.mojo"      # v0.4.0 — Router path matcher (200K)
fuzz-scheduler-shutdown = "mojo -I . fuzz/fuzz_scheduler_shutdown.mojo"  # v0.4.0 — scheduler runtime primitives (10K)
fuzz-extractors    = "mojo -I . fuzz/fuzz_extractors.mojo"        # v0.4.1 — typed extractors + Extracted[H] (200K)
fuzz-routes-comptime = "mojo -I . fuzz/fuzz_routes_comptime.mojo" # v0.4.1 — ComptimeRouter oracle vs runtime Router (200K)
fuzz-all           = { depends-on = ["fuzz-ws", "fuzz-url", "fuzz-headers", "fuzz-http-response", "fuzz-http-server", "fuzz-ws-server", "prop-ws", "prop-headers", "prop-auth", "fuzz-encoding", "fuzz-cookie", "fuzz-reactor-churn", "prop-timer-wheel", "fuzz-server-reactor-chunks", "fuzz-router-paths", "fuzz-scheduler-shutdown", "fuzz-extractors", "fuzz-routes-comptime"] }

[feature.dev.tasks]
# ── Docs (powered by mojodoc; dev-only because mojodoc is in feature.dev) ────
# docs:       build + serve at http://localhost:3000/flare/ (blocks terminal)
# docs-build: build static HTML → target/doc/ (for CI / GitHub Pages)
# Run with: pixi run -e dev <task>
docs       = "mojodoc ./flare --open"
docs-build = "mojodoc ./flare --out-dir target/doc --base-url /flare/"

# ── Format hook (dev-only because it wires pre-commit into .git/hooks) ──────
# `format` shells out to `mojo format`, which is available in the lean
# default env too — but we intentionally gate it on dev so every
# `pixi run -e dev format` also installs the git pre-commit hook for the
# contributor. Use `pixi run format-check` (below, in [tasks]) for a
# read-only CI-style check that runs without feature.dev.
install-pre-commit = "pre-commit install"
format             = { cmd = "mojo format flare tests benchmark examples fuzz", depends-on = ["install-pre-commit"] }

[environments]
# Lean default env — only flare's runtime deps. Ships tests, examples,
# microbenchmarks, and format-check out of the box. Contributors who
# need mojodoc / pre-commit should use `-e dev`.
default = { solve-group = "default" }
dev     = { features = ["dev"], solve-group = "default" }
fuzz    = { features = ["dev", "fuzz"], solve-group = "default" }
bench   = { features = ["dev", "bench"], solve-group = "default" }

[tasks]
# ── Tests (flat files, one file per test suite) ───────────────────────────────
# Each task runs a single test file; use 'pixi run tests' to run all.
# All test/example/microbench tasks work under the lean default env —
# they only need the base `mojo` compiler + runtime deps.
test-net         = "mojo -I . tests/test_net.mojo"          # Phase 1 — 57 tests
test-dns         = "mojo -I . tests/test_dns.mojo"          # Phase 2 — 17 tests
test-tcp         = "mojo -I . tests/test_tcp.mojo"          # Phase 3 — 19 tests
test-udp         = "mojo -I . tests/test_udp.mojo"          # Phase 4 — 10 tests
test-tls         = "mojo -I . tests/test_tls.mojo"          # Phase 5 — 16 tests
test-http        = "mojo -I . tests/test_http.mojo"         # Phase 6 — 45 tests
test-ws          = "mojo -I . tests/test_ws.mojo"           # Phase 7 — 33 tests
test-ergonomics  = "mojo -I . tests/test_ergonomics.mojo"   # Phase 8 — ergonomics
test-server      = "mojo -I . tests/test_server.mojo"      # Server: buffered reads, keep-alive — 35 tests
test-syscall-ffi = "mojo -I . tests/test_syscall_ffi.mojo"  # Stage 1/Phase 1.1 — epoll/kqueue/eventfd FFI (~22 tests)
test-reactor     = "mojo -I . tests/test_reactor.mojo"      # Stage 1/Phase 1.2 — Reactor abstraction (~20 tests)
test-timer-wheel = "mojo -I . tests/test_timer_wheel.mojo"  # Stage 1/Phase 1.3 — TimerWheel (~18 tests)
test-server-reactor-state = "mojo -I . tests/test_server_reactor_state.mojo"  # Stage 1/Phase 1.4 — state machine (~15 tests)
test-reactor-shutdown = "mojo -I . tests/test_reactor_shutdown.mojo"  # Stage 1/Phase 1.8 — shutdown + lifecycle (~7 tests)
test-handler         = "mojo -I . tests/test_handler.mojo"            # v0.4.0 Track 1 — Handler trait + FnHandler (~14 tests)
test-router          = "mojo -I . tests/test_router.mojo"             # v0.4.0 Track 1 — Router path/method dispatch (~23 tests)
test-server-handler  = "mojo -I . tests/test_server_handler.mojo"     # v0.4.0 Track 1 — HttpServer.serve[H: Handler & Copyable] single-worker (~6 tests)
test-app-state       = "mojo -I . tests/test_app_state.mojo"          # v0.4.0 Track 1 — App[S, H] + State[T] (~10 tests)
test-serve-comptime  = "mojo -I . tests/test_server_serve_comptime.mojo" # v0.4.0 Track 1 — comptime serve overload (~6 tests)
test-thread-ffi      = "mojo -I . tests/test_thread_ffi.mojo"         # v0.4.0 Track 3 — pthread + CPU pinning FFI (~10 tests)
test-reuseport       = "mojo -I . tests/test_reuseport.mojo"          # v0.4.0 Track 3 — SO_REUSEPORT helper (~6 tests)
test-scheduler       = "mojo -I . tests/test_scheduler.mojo"          # v0.4.0 Track 3 — multicore Scheduler lifecycle (~6 tests)
test-server-multicore = "mojo -I . tests/test_server_multicore.mojo"  # v0.4.0 Track 3 — HttpServer multicore (~7 tests)
test-extractors      = "mojo -I . tests/test_extractors.mojo"         # v0.4.1 Track 2 — Typed extractors + Extracted[H] (~42 tests)
test-routes-comptime = "mojo -I . tests/test_routes_comptime.mojo"    # v0.4.1 Track 2 — ComptimeRouter dispatch (~19 tests)

# ── Scheduler stress driver (non-mozz; runnable under the lean default env) ──
# Hammers Scheduler.start/shutdown with random (num_workers, pin_cores, churn)
# tuples and reports any iteration that exceeds the 5 s hang watchdog. Fills
# the coverage gap left by fuzz-scheduler-shutdown while the Mojo compiler's
# free-declaration conflict blocks the mozz harness.
#
# Env vars:
#   STRESS_ITERS (default 200)  — iteration count
#   STRESS_SEED  (default 0xC0FFEE) — decimal PRNG seed
stress-scheduler = "mojo -I . tests/stress_scheduler.mojo"

tests = { cmd = "mojo -I . tests/test_net.mojo && mojo -I . tests/test_dns.mojo && mojo -I . tests/test_tcp.mojo && mojo -I . tests/test_udp.mojo && mojo -I . tests/test_syscall_ffi.mojo && mojo -I . tests/test_reactor.mojo && mojo -I . tests/test_timer_wheel.mojo && mojo -I . tests/test_server_reactor_state.mojo && mojo -I . tests/test_reactor_shutdown.mojo && mojo -I . tests/test_tls.mojo && mojo -I . tests/test_http.mojo && mojo -I . tests/test_ws.mojo && mojo -I . tests/test_ergonomics.mojo && mojo -I . tests/test_handler.mojo && mojo -I . tests/test_router.mojo && mojo -I . tests/test_server_handler.mojo && mojo -I . tests/test_app_state.mojo && mojo -I . tests/test_server_serve_comptime.mojo && mojo -I . tests/test_thread_ffi.mojo && mojo -I . tests/test_reuseport.mojo && mojo -I . tests/test_scheduler.mojo && mojo -I . tests/test_server_multicore.mojo && mojo -I . tests/test_extractors.mojo && mojo -I . tests/test_routes_comptime.mojo && mojo -I . tests/test_server.mojo && mojo -I . examples/01_addresses.mojo && mojo -I . examples/02_dns_resolution.mojo && mojo -I . examples/03_error_handling.mojo && mojo -I . examples/04_tcp_echo.mojo && mojo -I . examples/05_http_get.mojo && mojo -I . examples/06_websocket_echo.mojo && mojo -I . examples/07_ergonomics.mojo && mojo -I . examples/08_http_server.mojo && mojo -I . examples/09_ws_server.mojo && mojo -I . examples/10_encoding.mojo && mojo -I . examples/11_udp.mojo && mojo -I . examples/12_tls.mojo && mojo -I . examples/13_cookies.mojo && mojo -I . examples/14_reactor.mojo && mojo -I . examples/15_router.mojo && mojo -I . examples/16_state.mojo && mojo -I . examples/17_multicore.mojo && mojo -I . examples/18_middleware.mojo && mojo -I . examples/19_extractors.mojo && mojo -I . examples/20_comptime_router.mojo" }

# ── Examples (runnable + tested as part of 'pixi run tests') ─────────────────
example-addresses   = "mojo -I . examples/01_addresses.mojo"
example-dns         = "mojo -I . examples/02_dns_resolution.mojo"
example-errors      = "mojo -I . examples/03_error_handling.mojo"
example-tcp         = "mojo -I . examples/04_tcp_echo.mojo"
example-http        = "mojo -I . examples/05_http_get.mojo"
example-ws          = "mojo -I . examples/06_websocket_echo.mojo"
example-ergonomics  = "mojo -I . examples/07_ergonomics.mojo"    # Phase 8 high-level API
example-http-server = "mojo -I . examples/08_http_server.mojo"   # HttpServer loopback
example-ws-server   = "mojo -I . examples/09_ws_server.mojo"     # WsServer loopback
example-encoding    = "mojo -I . examples/10_encoding.mojo"      # gzip/deflate encoding
example-udp         = "mojo -I . examples/11_udp.mojo"           # UdpSocket round-trip
example-tls         = "mojo -I . examples/12_tls.mojo"           # TlsStream client
example-cookies     = "mojo -I . examples/13_cookies.mojo"       # Cookie, CookieJar, parsers
example-reactor     = "mojo -I . examples/14_reactor.mojo"       # flare.runtime.Reactor (advanced)
example-router      = "mojo -I . examples/15_router.mojo"        # v0.4.0 — Router paths + methods
example-state       = "mojo -I . examples/16_state.mojo"         # v0.4.0 — App[S] + State[T]
example-multicore   = "mojo -I . examples/17_multicore.mojo"     # v0.4.0 — Multicore primitives
example-middleware  = "mojo -I . examples/18_middleware.mojo"    # v0.4.0 — Middleware composition (Logger + Auth + Router)
example-extractors  = "mojo -I . examples/19_extractors.mojo"    # v0.4.1 — Typed extractors + Extracted[H]
example-comptime-router = "mojo -I . examples/20_comptime_router.mojo"  # v0.4.1 — ComptimeRouter

examples = { cmd = "mojo -I . examples/01_addresses.mojo && mojo -I . examples/02_dns_resolution.mojo && mojo -I . examples/03_error_handling.mojo && mojo -I . examples/04_tcp_echo.mojo && mojo -I . examples/05_http_get.mojo && mojo -I . examples/06_websocket_echo.mojo && mojo -I . examples/07_ergonomics.mojo && mojo -I . examples/08_http_server.mojo && mojo -I . examples/09_ws_server.mojo && mojo -I . examples/10_encoding.mojo && mojo -I . examples/11_udp.mojo && mojo -I . examples/12_tls.mojo && mojo -I . examples/13_cookies.mojo && mojo -I . examples/14_reactor.mojo && mojo -I . examples/15_router.mojo && mojo -I . examples/16_state.mojo && mojo -I . examples/17_multicore.mojo && mojo -I . examples/18_middleware.mojo && mojo -I . examples/19_extractors.mojo && mojo -I . examples/20_comptime_router.mojo" }

# ── Microbenchmarks (mojo-only, no external load generators) ─────────────────
# bench-parse:   IP parsing + DNS resolution throughput (confirms SIMD NOT useful here)
# bench-ws-mask: WebSocket XOR masking scalar vs SIMD (confirms SIMD IS useful here)
# bench-http:    HTTP request throughput (stub — requires HttpClient impl)
# bench-tcp:     TCP throughput (stub — requires socket FFI impl)
# For the full flare-vs-baseline TFB plaintext harness (Go, nginx, wrk),
# see the `bench-vs-baseline*` tasks under feature.bench.
bench-parse   = "mojo -I . benchmark/bench_parse.mojo"
bench-ws-mask = "mojo -I . benchmark/bench_ws_mask.mojo"
bench-http    = "mojo -I . benchmark/bench_http.mojo"
bench-tcp     = "mojo -I . benchmark/bench_tcp.mojo"
bench-compare = "mojo -I . benchmark/bench_compare.mojo"  # HTTP encode/parse throughput
bench-server  = "mojo -I . benchmark/bench_server.mojo"   # HTTP server (use wrk against it)

# Run all available benchmarks (excludes bench-server which blocks)
bench = { cmd = "mojo -I . benchmark/bench_parse.mojo && mojo -I . benchmark/bench_ws_mask.mojo && mojo -I . benchmark/bench_http.mojo && mojo -I . benchmark/bench_compare.mojo" }

# ── Format check (read-only; runs under lean default env) ───────────────────
# Uses `mojo format`, which ships with the base mojo compiler — no
# pre-commit / feature.dev needed. For the write-side formatter (that
# also installs the git pre-commit hook) see `format` in
# [feature.dev.tasks] and run it with `pixi run -e dev format`.
format-check = "bash -c 'mojo format flare tests benchmark examples fuzz && git diff --exit-code flare tests benchmark examples fuzz || (echo \"Error: Code is not formatted. Run \\\"pixi run -e dev format\\\" to fix.\" && exit 1)'"
