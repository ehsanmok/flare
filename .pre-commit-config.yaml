repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml

-   repo: local
    hooks:
    -   id: mojo-format
        name: Mojo Format
        # `format` now lives under [feature.dev.tasks], so without the
        # explicit -e it's ambiguous across dev / fuzz / bench (all of
        # which include feature.dev). Pinning to dev keeps the hook
        # fast — the other envs pull in mozz / go / nginx that
        # `mojo format` doesn't need.
        entry: pixi run -e dev format
        language: system
        pass_filenames: false
