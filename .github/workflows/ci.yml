name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pin Linux to ``ubuntu-22.04`` rather than ``ubuntu-latest``.
        # The ``mojo 1.0.0b1.dev2026042405`` runtime
        # (``libKGENCompilerRTShared.so``) crashes immediately on
        # GitHub Actions' Ubuntu 24.04 image — the very first test
        # (``test_net.mojo``) prints its banner and then SIGSEGVs
        # inside the Mojo runtime, before any user code runs.
        # The same ``mojo`` build is healthy on Ubuntu 22.04 (matches
        # the dev box this repo benchmarks on) and on macOS 14, so
        # 22.04 is the safe target until Mojo upstream re-cuts a
        # 24.04-clean nightly. Once that lands and a green nightly
        # CI confirms it, this can move back to ``ubuntu-latest``.
        os: [ubuntu-22.04, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          # Only solve + install the lean runtime env. Without this,
          # setup-pixi installs every environment declared in pixi.toml
          # (dev, fuzz, bench), which would pull in mojodoc, mozz, go,
          # nginx, wrk, … — hundreds of MB of contributor-only tooling
          # that the CI test job doesn't touch.
          environments: default
          cache: false
          post-cleanup: false

      - name: Check formatting
        # Uses `mojo format`, which ships with the base mojo compiler —
        # no feature.dev (pre-commit) required.
        run: pixi run format-check

      - name: Run tests
        run: pixi run tests
