name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pin Linux to ``ubuntu-22.04`` (glibc 2.35) to dodge the same
        # ``libKGENCompilerRTShared.so`` runtime crash that the prior
        # ``ci: re-pin Linux fuzz runner`` commit pinned out of
        # fuzz.yml. The crash had been confined to the fuzz workload,
        # but the GH-Actions ``ubuntu-latest`` image rolled forward
        # and now ``tests/test_net.mojo`` -- the *first* file in
        # ``pixi run tests`` -- segfaults inside the Mojo runtime
        # before any user code runs (#0 .so+0x6dc0b -> #1 .so+0x6ade6
        # -> #2 .so+0x6e8b7 -> libc+0x45330). Same per-frame offsets
        # as the fuzz crash, which confirms a single Mojo / glibc-2.39
        # ABI break, not a flare-side regression. macOS-14 keeps
        # passing on the same nightly. Revert when Mojo upstream
        # re-cuts a 24.04-clean nightly.
        os: [ubuntu-22.04, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          # Only solve + install the lean runtime env. Without this,
          # setup-pixi installs every environment declared in pixi.toml
          # (dev, fuzz, bench), which would pull in mojodoc, mozz, go,
          # nginx, wrk, … — hundreds of MB of contributor-only tooling
          # that the CI test job doesn't touch.
          environments: default
          cache: false
          post-cleanup: false

      - name: Check formatting
        # Uses `mojo format`, which ships with the base mojo compiler —
        # no feature.dev (pre-commit) required.
        run: pixi run format-check

      - name: Generate self-signed cert for TLS tests
        # test_tls_acceptor.mojo loads a real cert/key pair to exercise
        # ServerCtx.new + reload + mTLS callbacks end-to-end. The script
        # only depends on conda-forge openssl (already in the default
        # env's [dependencies]); running it through `pixi run` picks up
        # that openssl on PATH.
        run: pixi run bash benchmark/scripts/_make_self_signed.sh

      - name: Run tests
        run: pixi run tests
