name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux: ``ubuntu-latest`` (currently 24.04, glibc 2.39). The
        # ``libKGENCompilerRTShared.so`` runtime crash that previously
        # forced this matrix onto ``ubuntu-22.04`` is back —
        # specifically, the Mojo runtime segfaults transiently on a
        # fresh process before any user code runs (same per-frame
        # offsets ``+0x6ec5b / +0x6be36 / +0x6f907`` documented for
        # the macos-14 OwnedDLHandle FFI bug). It's heisenbuggy:
        # CI on ``79dcd54`` (immediate predecessor of ``6b36981``)
        # passed on the same image, then ``6b36981`` crashed; the
        # fuzz workflow on the same image hit the same offsets at run
        # 25351119595. Rather than repinning the matrix again, the
        # ``Run tests`` step re-uses the retry-up-to-3x wrapper that
        # was added in ``bcd107d2`` and inadvertently dropped in
        # ``0a14f15`` — the same wrapper the workflow used to
        # absorb the same crash family before. Toolchain side
        # (``flare/tls/ffi`` C++ wrapper, every rust-built bench
        # baseline) builds against the conda-forge sysroot pinned at
        # glibc ``>=2.34`` (see
        # ``[target.linux-64.dependencies] sysroot_linux-64 = ">=2.34"``
        # in ``pixi.toml``), so the resulting binaries reference
        # only GLIBC_2.34 and below and stay portable down to RHEL 9
        # / Debian 12 / Ubuntu 22.04 hosts.
        #
        # macOS pinned to ``macos-15`` (Sequoia, arm64). The previous
        # ``macos-14`` image hit a Mojo-runtime segfault inside
        # ``libKGENCompilerRTShared.dylib`` whenever a function-local
        # ``OwnedDLHandle`` was reclaimed before the ``get_function``
        # pointer was invoked (see ``flare/http/middleware.mojo``
        # ``_flare_fs_access`` for the lifetime fix). macos-15 matches
        # the host SDK we develop against locally; revisit if Apple
        # retires the runner.
        os: [ubuntu-latest, macos-15]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          # Only solve + install the lean runtime env. Without this,
          # setup-pixi installs every environment declared in pixi.toml
          # (dev, fuzz, bench), which would pull in mojodoc, mozz, go,
          # nginx, wrk, … — hundreds of MB of contributor-only tooling
          # that the CI test job doesn't touch.
          environments: default
          cache: false
          post-cleanup: false

      - name: Check formatting
        # Uses `mojo format`, which ships with the base mojo compiler —
        # no feature.dev (pre-commit) required.
        run: pixi run format-check

      - name: Generate self-signed cert for TLS tests
        # test_tls_acceptor.mojo loads a real cert/key pair to exercise
        # ServerCtx.new + reload + mTLS callbacks end-to-end. The script
        # only depends on conda-forge openssl (already in the default
        # env's [dependencies]); running it through `pixi run` picks up
        # that openssl on PATH.
        run: pixi run bash benchmark/scripts/_make_self_signed.sh

      - name: Run tests
        # The Mojo nightly's ``libKGENCompilerRTShared.so`` segfaults
        # transiently on a fresh process before any user code runs
        # (same per-frame offsets the workflow header documents).
        # ~1-in-3 invocation rate on the current ``ubuntu-latest``
        # image; the next run always succeeds. Retry up to three
        # times so the build only fails if the runtime crash is
        # stable, not flaky. The shell ``set -e`` is intentionally
        # not used inside the loop body so the retry can observe the
        # non-zero exit.
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "── tests attempt $attempt/3 ──"
            pixi run tests
            rc=$?
            if [ $rc -eq 0 ]; then
              exit 0
            fi
            echo "── attempt $attempt failed (rc=$rc), retrying ──"
            sleep 5
          done
          echo "── all 3 attempts failed (rc=$rc) ──"
          exit $rc
