name: Fuzz

on:
  schedule:
    - cron: '0 2 * * *'   # nightly at 02:00 UTC
  workflow_dispatch:        # manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Fuzz (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux: pinned back to ``ubuntu-22.04`` (kernel 6.x, glibc
        # 2.35). On the latest ``ubuntu-latest`` runner image
        # (``ubuntu-24.04 / 20260413.86.1``, kernel 6.17.0, glibc
        # 2.39) the ``libKGENCompilerRTShared.so`` runtime crash that
        # was previously fixed in the pinned Mojo nightly
        # (``mojo == 1.0.0b1.dev2026042717``) reproduces again — the
        # fuzzer's tight mutate / JIT-execute loop trips it on the
        # very first run, before any harness work happens (see run
        # 25351119595). ``pixi run tests`` on the same image is
        # unaffected (CI doesn't drive the JIT hard enough), so
        # ``ci.yml`` stays on ``ubuntu-latest``. As with ci.yml, the
        # build side (sysroot pinned at glibc ``>=2.34`` via
        # conda-forge) keeps the resulting binaries portable down to
        # glibc 2.34 hosts. Revisit when the Mojo nightly grows a
        # fix, or when a future GHA image rolls a kernel that
        # doesn't trip the crash.
        os: [ubuntu-22.04, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: fuzz
          cache: false
          post-cleanup: false

      - name: Fuzz WS frame parser
        run: pixi run --environment fuzz fuzz-ws

      - name: Fuzz URL parser
        run: pixi run --environment fuzz fuzz-url

      - name: Fuzz HTTP headers parser
        run: pixi run --environment fuzz fuzz-headers

      - name: Fuzz HTTP response parser
        run: pixi run --environment fuzz fuzz-http-response

      - name: Fuzz HTTP server
        run: pixi run --environment fuzz fuzz-http-server

      - name: Fuzz WS server
        run: pixi run --environment fuzz fuzz-ws-server

      - name: Fuzz encoding
        run: pixi run --environment fuzz fuzz-encoding

      - name: Property tests — WS roundtrip
        run: pixi run --environment fuzz prop-ws

      - name: Property tests — HTTP headers
        run: pixi run --environment fuzz prop-headers

      - name: Property tests — Auth
        run: pixi run --environment fuzz prop-auth

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.os }}-${{ github.run_id }}
          path: .mozz_crashes/
          if-no-files-found: ignore
