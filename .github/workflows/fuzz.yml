name: Fuzz

on:
  schedule:
    - cron: '0 2 * * *'   # nightly at 02:00 UTC
  workflow_dispatch:        # manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Fuzz (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pin Linux to ``ubuntu-22.04`` (glibc 2.35) for the same
        # reason as the original ``5e28b84`` pin: the pinned Mojo
        # nightly (``mojo == 0.26.3.0.dev2026042005``) crashes inside
        # its own runtime on ``ubuntu-latest`` (24.04 / glibc 2.39)
        # under the fuzzer's workload. The crash has the documented
        # signature -- four frames inside
        # ``libKGENCompilerRTShared.so`` finishing in
        # ``libc.so.6+0x45330``, with ``mojo: error: execution
        # crashed`` -- and reproduces 100% on ``ubuntu-latest`` while
        # the same nightly + the same harness run clean on macOS-14
        # and on this repo's Ubuntu 22.04 dev box. ``ci.yml`` stays on
        # ``ubuntu-latest`` because the unit-test workload doesn't
        # trigger the crash; the fuzzer's hot loop is what hits it.
        # Revert to ``ubuntu-latest`` once Mojo upstream re-cuts a
        # 24.04-clean nightly we can pin against.
        os: [ubuntu-22.04, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: fuzz
          cache: false
          post-cleanup: false

      - name: Fuzz WS frame parser
        run: pixi run --environment fuzz fuzz-ws

      - name: Fuzz URL parser
        run: pixi run --environment fuzz fuzz-url

      - name: Fuzz HTTP headers parser
        run: pixi run --environment fuzz fuzz-headers

      - name: Fuzz HTTP response parser
        run: pixi run --environment fuzz fuzz-http-response

      - name: Fuzz HTTP server
        run: pixi run --environment fuzz fuzz-http-server

      - name: Fuzz WS server
        run: pixi run --environment fuzz fuzz-ws-server

      - name: Fuzz encoding
        run: pixi run --environment fuzz fuzz-encoding

      - name: Property tests — WS roundtrip
        run: pixi run --environment fuzz prop-ws

      - name: Property tests — HTTP headers
        run: pixi run --environment fuzz prop-headers

      - name: Property tests — Auth
        run: pixi run --environment fuzz prop-auth

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.os }}-${{ github.run_id }}
          path: .mozz_crashes/
          if-no-files-found: ignore
