name: Fuzz

on:
  schedule:
    - cron: '0 2 * * *'   # nightly at 02:00 UTC
  workflow_dispatch:        # manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Fuzz (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux: ``ubuntu-latest`` (currently 24.04, glibc 2.39). The
        # ``libKGENCompilerRTShared.so`` runtime crash on the pinned
        # Mojo nightly (``mojo == 0.26.3.0.dev2026042005``) that
        # previously forced ``ubuntu-22.04`` no longer reproduces on
        # the current pinned nightly
        # (``mojo == 0.26.3.0.dev2026042717``); the fuzzer's hot loop
        # (which was the fastest-to-trip surface) runs clean. As with
        # ci.yml, the build side (sysroot pinned at glibc ``>=2.34``
        # via conda-forge) keeps the resulting binaries portable
        # down to glibc 2.34 hosts.
        os: [ubuntu-latest, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: fuzz
          cache: false
          post-cleanup: false

      - name: Fuzz WS frame parser
        run: pixi run --environment fuzz fuzz-ws

      - name: Fuzz URL parser
        run: pixi run --environment fuzz fuzz-url

      - name: Fuzz HTTP headers parser
        run: pixi run --environment fuzz fuzz-headers

      - name: Fuzz HTTP response parser
        run: pixi run --environment fuzz fuzz-http-response

      - name: Fuzz HTTP server
        run: pixi run --environment fuzz fuzz-http-server

      - name: Fuzz WS server
        run: pixi run --environment fuzz fuzz-ws-server

      - name: Fuzz encoding
        run: pixi run --environment fuzz fuzz-encoding

      - name: Property tests — WS roundtrip
        run: pixi run --environment fuzz prop-ws

      - name: Property tests — HTTP headers
        run: pixi run --environment fuzz prop-headers

      - name: Property tests — Auth
        run: pixi run --environment fuzz prop-auth

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.os }}-${{ github.run_id }}
          path: .mozz_crashes/
          if-no-files-found: ignore
