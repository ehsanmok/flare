name: Docs

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# run in-progress and latest queued.  Do NOT cancel in-progress runs so
# production deployments are always allowed to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          # Pin pixi: latest ships build-api-version >=5 which drops the
          # pixi-build-rattler-build 0.3.13 backend this repo pins, breaking
          # the mojodoc git build (and the flare package build). 0.70.2 is
          # the newest compatible pixi.
          pixi-version: v0.70.2
          environments: dev
          # Install straight from the committed pixi.lock; never re-solve
          # conda-forge in CI (the network solve is flaky). Fails loudly
          # if the lock has drifted from pixi.toml.
          locked: true
          cache: false
          post-cleanup: false

      - name: Generate docs with mojodoc
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: pixi run -e dev docs-build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
