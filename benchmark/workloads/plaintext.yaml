# TechEmpower Framework Benchmarks (TFB) plaintext workload (test type #6).
#
# Spec:
#   https://github.com/TechEmpower/FrameworkBenchmarks/wiki/Project-Information-Framework-Tests-Overview#test-type-6-plaintext
#
# Every baseline MUST produce byte-identical bodies and headers matching
# this spec (modulo the whitelisted Date / Server / Connection /
# Keep-Alive headers which each target sets to its own default).

path: /plaintext
method: GET

response:
  status: 200
  content_type: "text/plain; charset=utf-8"
  body: "Hello, World!"
  # 13 bytes, no trailing newline.
  body_length: 13

# Headers that are allowed to vary across targets (each target's default).
header_whitelist:
  - Date
  - Server
  - Connection
  - Keep-Alive
