# 1-worker nginx configuration for the TFB plaintext benchmark.
# Serves the exact 13-byte "Hello, World!" response on /plaintext.

worker_processes 1;
daemon off;
# Minimal log volume so disk I/O isn't part of the benchmark.
error_log /dev/null emerg;
pid {{NGINX_PID}};

events {
    worker_connections 1024;
    # No `use` directive: nginx auto-selects epoll on Linux and kqueue on
    # macOS. Hard-coding `use kqueue` made the Linux CI nginx baseline fail
    # with "invalid event type" since that binary is built without kqueue
    # support.
}

http {
    # No request logs.
    access_log off;

    # conda-forge's nginx binary is configured with relative compile-time
    # paths (var/tmp/nginx/client, var/log/nginx/access.log, …) that are
    # interpreted against the `-p <prefix>` dir nginx is launched with. We
    # don't want the benchmark harness to need to pre-create those dirs
    # (and on Linux CI the bench dir is read-only-ish), so pin everything
    # under /tmp. macOS nginx from homebrew also accepts this.
    client_body_temp_path /tmp/nginx-flare-bench/client;
    proxy_temp_path       /tmp/nginx-flare-bench/proxy;
    fastcgi_temp_path     /tmp/nginx-flare-bench/fastcgi;
    scgi_temp_path        /tmp/nginx-flare-bench/scgi;
    uwsgi_temp_path       /tmp/nginx-flare-bench/uwsgi;

    default_type text/plain;
    sendfile on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100000;

    server {
        listen {{PORT}} reuseport;
        server_name _;

        location /plaintext {
            default_type "text/plain; charset=utf-8";
            return 200 "Hello, World!";
        }
    }
}
