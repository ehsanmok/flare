# 1-worker nginx configuration for the TFB plaintext benchmark.
# Serves the exact 13-byte "Hello, World!" response on /plaintext.

worker_processes 1;
daemon off;
# Minimal log volume so disk I/O isn't part of the benchmark.
error_log /dev/null emerg;
pid {{NGINX_PID}};

events {
    worker_connections 1024;
    use kqueue;  # auto-selected on linux too
}

http {
    # No request logs.
    access_log off;

    default_type text/plain;
    sendfile on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100000;

    server {
        listen {{PORT}} reuseport;
        server_name _;

        location /plaintext {
            default_type "text/plain; charset=utf-8";
            return 200 "Hello, World!";
        }
    }
}
