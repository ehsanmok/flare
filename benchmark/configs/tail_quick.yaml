# tail_quick — wrk2 fixed-throughput run for tail-percentile
# measurement (v0.5.0 Step 2 / Track 6.1).
#
# wrk2's --latency mode reports p50 / p75 / p90 / p99 / p99.9 /
# p99.99 / p99.999 *without* coordinated omission, which wrk's
# default mode silently introduces. The fixed -R rate (10K req/s
# here) keeps the load generator sending at a constant pace
# regardless of the server's response latency, so the latency
# samples reflect actual queueing.
#
# This config is the smallest wrk2 run that produces a stable
# tail; expand to longer durations + higher rates for production
# bench reports (lands in the Linux-side number-publishing
# follow-up).
name: tail_quick
tool: wrk2
wrk_threads: 1
wrk_connections: 64
wrk_duration_seconds: 30
wrk_rate: 10000
warmup_seconds: 10
runs: 5
quiet_seconds: 5
stdev_pct_gate: 3.0
